name: SimLauncher
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "13.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.simlauncher.app
    PRODUCT_NAME: SimLauncher
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
targets:
  SimLauncher:
    type: application
    platform: macOS
    sources:
      - Sources/SimLauncher
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simlauncher.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      gatherCoverageData: false
